<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AAAI Slides — Art [&&] Impact</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️‍🗨️</text></svg>" />
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7f4;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .page {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
      flex: 1;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      margin-bottom: 2rem;
    }

    .course-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      color: #111;
    }

    .subtitle {
      margin-top: 0.35rem;
      font-size: 0.9rem;
      color: #666;
    }

    /* ── Session list ───────────────────────────────────────── */
    .sessions {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1.75rem;
    }

    .session-item {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .session-card {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .session-card:hover,
    .session-card:focus-visible {
      border-color: #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      outline: none;
    }

    .session-card.latest {
      border-color: #111;
    }

    .pdf-link {
      display: flex;
      align-items: center;
      padding: 0 0.85rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .pdf-link:hover {
      border-color: #aaa;
      color: #111;
    }

    .session-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .session-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .badge-latest {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      padding: 0.2em 0.55em;
      border-radius: 4px;
    }

    .arrow {
      color: #bbb;
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #ccc;
      padding: 1.5rem 1.25rem;
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <!-- ✏️ Edit course name, institution, or tagline here -->
      <span class="course-tag">BSc Creative Technology · UT Twente / VU Amsterdam</span>
      <h1>Art [&amp;&amp;] Impact</h1>
      <p class="subtitle">Lecture &amp; workshop slides — 2025/26</p>
    </header>

    <!-- Session cards are generated here by deploy.sh — do not edit this comment marker -->
    <nav class="sessions" aria-label="Sessions">
      <div class="session-item"><a href="s0-slides/" class="session-card latest"><span class="session-name">s0-slides</span><span class="session-meta"><span class="badge-latest">Latest</span><span class="arrow">›</span></span></a><a href="s0-slides.pdf" class="pdf-link" download>PDF ↓</a></div>
      <div class="session-item"><a href="s1a-slides/" class="session-card"><span class="session-name">s1a-slides</span><span class="arrow">›</span></a><a href="s1a-slides.pdf" class="pdf-link" download>PDF ↓</a></div>
      <div class="session-item"><a href="s1b-slides/" class="session-card"><span class="session-name">s1b-slides</span><span class="arrow">›</span></a><a href="s1b-slides.pdf" class="pdf-link" download>PDF ↓</a></div>
      <div class="session-item"><a href="s2-slides/" class="session-card"><span class="session-name">s2-slides</span><span class="arrow">›</span></a><a href="s2-slides.pdf" class="pdf-link" download>PDF ↓</a></div>
      <div class="session-item"><a href="s3-slides/" class="session-card"><span class="session-name">s3-slides</span><span class="arrow">›</span></a><a href="s3-slides.pdf" class="pdf-link" download>PDF ↓</a></div>
    </nav>

  </div>

  <!-- ✏️ Edit or remove this footer freely -->
  <footer>
    Art [&amp;&amp;] Impact · AAAI 2026
  </footer>
</body>
</html>
